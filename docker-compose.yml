# Файл docker-compose.yml
version: '3'

volumes:
  pg_data:
  static:
  media:
  redoc:

services:
  db:
    image: postgres:13.10
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data
  backend:
    build: ./backend/foodgram/
    env_file: .env
    # Тут подключаем volume к backend
    volumes:
      - media:/app/media
      - redoc:/app/api/docs/
      - static:/backend_static/
  frontend:
    env_file: .env
    build: ./frontend/
    volumes:
      - ./frontend/:/app/result_build/
  gateway:
    build: ./infra/
    # А тут подключаем volume со статикой к gateway
    volumes:
      - static:/staticfiles/
      - media:/app/media
    ports:
      - 8000:80
